<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservaciones</title>
    <link rel="stylesheet" href="../crud/styles.css">
</head>

<body>

<div class="container">

    <h1>CRUD Reservaciones</h1>

    <div class="form-container">

        <form id="reservationForm">

            <label>Usuario</label>
            <select id="user"></select>

            <label>Espacio</label>
            <select id="space"></select>

            <label>Fecha</label>
            <input type="date" id="dateReserved">

            <label>Estado</label>

            <select id="status">
                <option>PENDING</option>
                <option>APPROVED</option>
                <option>CANCELLED</option>
            </select>

            <button type="submit">
                Guardar
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <div class="table-container">

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Espacio</th>
                <th>Fecha</th>
                <th>Estado</th>
            </tr>
            </thead>

            <tbody id="reservationTable"></tbody>

        </table>

    </div>

</div>

<script src="crud-reservation.js"></script>

</body>
</html>
